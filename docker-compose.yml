version: '3.8'

services:
  backend:
    image: python:3.9-slim
    working_dir: /app
    volumes:
      - ./backend:/app
    command: >
      bash -c "pip install -r requirements.txt && uvicorn main:socket_app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./patchai.db
      - PYTHONUNBUFFERED=1

  frontend:
    image: node:20-slim
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: >
      bash -c "npm install && npm run dev"
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
